apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  type: ClusterIP
  selector:
    component: order
  ports:
    - port: 5000
      name: http
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: order
  template:
    metadata:
      labels:
        component: order
    spec:
      containers:
        - name: order
          image: order:latest
          imagePullPolicy: IfNotPresent
          command: ["gunicorn"]
          args: ["-k", "uvicorn.workers.UvicornWorker", "-b", "0.0.0.0:5000", "-w", "$(ORDER_GUNICORN_WORKERS)", "--timeout", "120", "app:app"]
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
          env:
            - name: STOCK_SERVICE_URL
              value: "http://stock-service:5000"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:5000"
            - name: ORDER_GUNICORN_WORKERS
              value: "2"
            - name: REDIS_HOST
              value: "order-db"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_SENTINEL_HOSTS
              value: "sentinel:26379"
            - name: REDIS_MASTER_NAME
              value: "order-db"
            - name: TX_MODE
              value: "2pc"
            - name: SAGA_MQ_REDIS_HOST
              value: "saga-broker"
            - name: SAGA_MQ_REDIS_PORT
              value: "6379"
            - name: SAGA_MQ_REDIS_PASSWORD
              value: "redis"
            - name: SAGA_MQ_SENTINEL_HOSTS
              value: "sentinel:26379"
            - name: SAGA_MQ_MASTER_NAME
              value: "saga-broker"
