# --- Order DB HA ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: order-db-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
spec:
  selector:
    app: order-db
  ports:
    - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
      - name: redis
        image: redis:7.2-bookworm
        command: ["redis-server", "--requirepass", "redis", "--appendonly", "yes"]
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: order-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db-replica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db-replica
  template:
    metadata:
      labels:
        app: order-db-replica
    spec:
      containers:
      - name: redis
        image: redis:7.2-bookworm
        command: ["redis-server", "--requirepass", "redis", "--appendonly", "yes", "--replicaof", "order-db", "6379", "--masterauth", "redis"]

