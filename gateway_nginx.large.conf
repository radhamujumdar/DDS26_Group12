worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream order_backend {
        zone order_backend 64k;
        least_conn;
        server dds-large-order-service-1:5000 max_fails=1 fail_timeout=5s;
        server dds-large-order-service-2:5000 max_fails=1 fail_timeout=5s;
        keepalive 128;
    }

    upstream payment_backend {
        zone payment_backend 64k;
        least_conn;
        server dds-large-payment-service-1:5000 max_fails=1 fail_timeout=5s;
        server dds-large-payment-service-2:5000 max_fails=1 fail_timeout=5s;
        keepalive 64;
    }

    upstream stock_backend {
        zone stock_backend 64k;
        least_conn;
        server dds-large-stock-service-1:5000 max_fails=1 fail_timeout=5s;
        server dds-large-stock-service-2:5000 max_fails=1 fail_timeout=5s;
        keepalive 64;
    }

    server {
        listen 80;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        location /orders/checkout/ {
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 3;
            proxy_pass http://order_backend;
        }

        location /orders/ {
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://order_backend;
        }

        location /payment/ {
            rewrite ^/payment/(.*)$ /$1 break;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://payment_backend;
        }

        location /stock/ {
            rewrite ^/stock/(.*)$ /$1 break;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://stock_backend;
        }

        access_log /var/log/nginx/server.access.log;
    }

    access_log /var/log/nginx/access.log;
}
