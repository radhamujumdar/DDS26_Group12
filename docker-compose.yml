version: "3"
services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service
    restart: always

  order-service:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
    command: gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db
    restart: always


  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes
    restart: always


  stock-service:
    build: ./stock
    image: stock:latest
    environment:
      - GATEWAY_URL=http://gateway:80
    command: gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db
    restart: always


  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes
    restart: always

  payment-service:
    build: ./payment
    image: user:latest
    environment:
      - GATEWAY_URL=http://gateway:80
    command: gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
    depends_on:
      - payment-db
    restart: always


  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes
    restart: always


  watchdog:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    command: >
      sh -c "
        echo 'Watchdog started - monitoring containers every 3 seconds';
        while true; do
          for svc in stock-service payment-service order-service gateway order-db stock-db payment-db; do
            CONTAINER=$$(docker ps -a -q --filter label=com.docker.compose.service=$${svc} --filter status=exited | head -n 1);
            if [ -n \"$$CONTAINER\" ]; then
              echo \"Restarting $$svc...\";
              docker start $$CONTAINER;
            fi;
          done;
          sleep 3;
        done
      "
