services:
  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${DDS_GATEWAY_PORT:-8000}:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: user:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
    depends_on:
      - payment-db

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  fluxi-server:
    build:
      context: .
      dockerfile: fluxi-server/Dockerfile
    image: fluxi-server:latest
    environment:
      - FLUXI_REDIS_MODE=sentinel
      - FLUXI_REDIS_URL=redis://:redis@fluxi-redis-master:6379/0
      - FLUXI_SENTINEL_ENDPOINTS=fluxi-sentinel-1:26379,fluxi-sentinel-2:26379,fluxi-sentinel-3:26379
      - FLUXI_SENTINEL_SERVICE_NAME=fluxi-master
      - FLUXI_SENTINEL_MIN_OTHER_SENTINELS=1
    depends_on:
      - fluxi-redis-master
      - fluxi-redis-replica
      - fluxi-sentinel-1
      - fluxi-sentinel-2
      - fluxi-sentinel-3
    ports:
      - "${DDS_FLUXI_SERVER_PORT:-8001}:8001"

  fluxi-scheduler:
    build:
      context: .
      dockerfile: fluxi-scheduler/Dockerfile
    image: fluxi-scheduler:latest
    environment:
      - FLUXI_REDIS_MODE=sentinel
      - FLUXI_REDIS_URL=redis://:redis@fluxi-redis-master:6379/0
      - FLUXI_SENTINEL_ENDPOINTS=fluxi-sentinel-1:26379,fluxi-sentinel-2:26379,fluxi-sentinel-3:26379
      - FLUXI_SENTINEL_SERVICE_NAME=fluxi-master
      - FLUXI_SENTINEL_MIN_OTHER_SENTINELS=1
    depends_on:
      - fluxi-redis-master
      - fluxi-redis-replica
      - fluxi-sentinel-1
      - fluxi-sentinel-2
      - fluxi-sentinel-3

  fluxi-redis-master:
    image: redis:7.2-bookworm
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - ""
      - --protected-mode
      - "no"
      - --requirepass
      - redis
      - --maxmemory
      - 512mb

  fluxi-redis-replica:
    image: redis:7.2-bookworm
    command:
      - redis-server
      - --replicaof
      - fluxi-redis-master
      - "6379"
      - --masterauth
      - redis
      - --requirepass
      - redis
      - --replica-announce-ip
      - fluxi-redis-replica
      - --replica-announce-port
      - "6379"
      - --save
      - ""
      - --appendonly
      - "no"
      - --protected-mode
      - "no"
      - --maxmemory
      - 512mb
    depends_on:
      - fluxi-redis-master

  fluxi-sentinel-1:
    image: redis:7.2-bookworm
    command:
      - sh
      - -c
      - |
        cat <<'EOF' >/tmp/sentinel.conf
        port 26379
        dir /tmp
        protected-mode no
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor fluxi-master fluxi-redis-master 6379 2
        sentinel auth-pass fluxi-master redis
        sentinel down-after-milliseconds fluxi-master 3000
        sentinel failover-timeout fluxi-master 10000
        sentinel parallel-syncs fluxi-master 1
        EOF
        redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      - fluxi-redis-master
      - fluxi-redis-replica

  fluxi-sentinel-2:
    image: redis:7.2-bookworm
    command:
      - sh
      - -c
      - |
        cat <<'EOF' >/tmp/sentinel.conf
        port 26379
        dir /tmp
        protected-mode no
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor fluxi-master fluxi-redis-master 6379 2
        sentinel auth-pass fluxi-master redis
        sentinel down-after-milliseconds fluxi-master 3000
        sentinel failover-timeout fluxi-master 10000
        sentinel parallel-syncs fluxi-master 1
        EOF
        redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      - fluxi-redis-master
      - fluxi-redis-replica

  fluxi-sentinel-3:
    image: redis:7.2-bookworm
    command:
      - sh
      - -c
      - |
        cat <<'EOF' >/tmp/sentinel.conf
        port 26379
        dir /tmp
        protected-mode no
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor fluxi-master fluxi-redis-master 6379 2
        sentinel auth-pass fluxi-master redis
        sentinel down-after-milliseconds fluxi-master 3000
        sentinel failover-timeout fluxi-master 10000
        sentinel parallel-syncs fluxi-master 1
        EOF
        redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      - fluxi-redis-master
      - fluxi-redis-replica
