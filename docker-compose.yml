version: "3"
services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: user:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
    depends_on:
      - payment-db

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  # ---------------------------------------------------------------------------
  # Fluxi orchestrator infrastructure
  # ---------------------------------------------------------------------------

  fluxi-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  fluxi-server:
    image: fluxi-server:latest
    environment:
      - FLUXI_REDIS_URL=redis://:redis@fluxi-db:6379/0
    depends_on:
      - fluxi-db

  # ---------------------------------------------------------------------------
  # Fluxi workers — one per service domain
  # ---------------------------------------------------------------------------

  order-checkout-worker:
    image: order:latest
    command: python workers/checkout_worker.py
    environment:
      - FLUXI_REDIS_URL=redis://:redis@fluxi-db:6379/0
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db
      - fluxi-server

  stock-activity-worker:
    image: stock:latest
    command: python workers/stock_worker.py
    environment:
      - FLUXI_REDIS_URL=redis://:redis@fluxi-db:6379/0
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db
      - fluxi-server

  payment-activity-worker:
    image: user:latest
    command: python workers/payment_worker.py
    environment:
      - FLUXI_REDIS_URL=redis://:redis@fluxi-db:6379/0
    env_file:
      - env/payment_redis.env
    depends_on:
      - payment-db
      - fluxi-server
