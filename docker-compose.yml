version: "3"

# Redis Cluster topology:
#   main-cluster-1..6  — 3 masters + 3 replicas, shared by order/stock/payment services
#   saga-cluster-1..6  — 3 masters + 3 replicas, shared by all saga MQ workers
# cluster-init creates both clusters once on first boot.

services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service
    restart: always

  order-service:
    build: ./order
    image: order:latest
    environment:
      - STOCK_SERVICE_URL=${STOCK_SERVICE_URL:-http://stock-service:5000}
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL:-http://payment-service:5000}
      - TX_MODE=${TX_MODE:-2pc}
      - ORDER_GUNICORN_WORKERS=${ORDER_GUNICORN_WORKERS:-2}
      - ENABLE_ORDER_DISPATCHER=${ENABLE_ORDER_DISPATCHER:-true}
      - REDIS_HOST=main-cluster-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_CLUSTER_NODES=main-cluster-1:6379,main-cluster-2:6379,main-cluster-3:6379,main-cluster-4:6379,main-cluster-5:6379,main-cluster-6:6379
      - SAGA_MQ_REDIS_HOST=saga-cluster-1
      - SAGA_MQ_REDIS_PORT=6379
      - SAGA_MQ_REDIS_PASSWORD=redis
      - SAGA_MQ_REDIS_DB=0
      - SAGA_MQ_CLUSTER_NODES=saga-cluster-1:6379,saga-cluster-2:6379,saga-cluster-3:6379,saga-cluster-4:6379,saga-cluster-5:6379,saga-cluster-6:6379
      - SAGA_MQ_STREAM_PARTITIONS=${SAGA_MQ_STREAM_PARTITIONS:-4}
      - SAGA_MQ_RESPONSE_TIMEOUT_MS=${SAGA_MQ_RESPONSE_TIMEOUT_MS:-6000}
      - SAGA_MQ_COMMAND_STREAM_MAXLEN=${SAGA_MQ_COMMAND_STREAM_MAXLEN:-100000}
      - SAGA_MQ_RESULT_STREAM_MAXLEN=${SAGA_MQ_RESULT_STREAM_MAXLEN:-100000}
      - SAGA_MQ_PENDING_TTL_SECONDS=${SAGA_MQ_PENDING_TTL_SECONDS:-3600}
      - SAGA_MQ_PENDING_STALE_AFTER_MS=${SAGA_MQ_PENDING_STALE_AFTER_MS:-3000}
      - SAGA_MQ_POLL_INTERVAL_SECONDS=${SAGA_MQ_POLL_INTERVAL_SECONDS:-0.05}
      - SAGA_MQ_DISPATCH_BLOCK_MS=${SAGA_MQ_DISPATCH_BLOCK_MS:-1000}
      - SAGA_MQ_DISPATCH_LEASE_TTL_SECONDS=${SAGA_MQ_DISPATCH_LEASE_TTL_SECONDS:-10}
      - SAGA_MQ_DISPATCH_RENEW_INTERVAL_SECONDS=${SAGA_MQ_DISPATCH_RENEW_INTERVAL_SECONDS:-2.0}
    depends_on:
      cluster-init:
        condition: service_completed_successfully
    restart: always
    command: >
      sh -c "gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000
      -w $${ORDER_GUNICORN_WORKERS} --timeout 30 --log-level=info app:app"

  stock-service:
    build: ./stock
    image: stock:latest
    environment:
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL:-http://order-service:5000}
      - STOCK_GUNICORN_WORKERS=${STOCK_GUNICORN_WORKERS:-1}
      - REDIS_HOST=main-cluster-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_CLUSTER_NODES=main-cluster-1:6379,main-cluster-2:6379,main-cluster-3:6379,main-cluster-4:6379,main-cluster-5:6379,main-cluster-6:6379
      - SAGA_MQ_REDIS_HOST=saga-cluster-1
      - SAGA_MQ_REDIS_PORT=6379
      - SAGA_MQ_REDIS_PASSWORD=redis
      - SAGA_MQ_REDIS_DB=0
      - SAGA_MQ_CLUSTER_NODES=saga-cluster-1:6379,saga-cluster-2:6379,saga-cluster-3:6379,saga-cluster-4:6379,saga-cluster-5:6379,saga-cluster-6:6379
      - SAGA_MQ_ENABLED=${SAGA_MQ_ENABLED:-true}
      - ENABLE_SAGA_WORKER=${STOCK_ENABLE_SAGA_WORKER:-true}
      - ENABLE_RECOVERY_LOOP=${STOCK_ENABLE_RECOVERY_LOOP:-true}
      - RECOVERY_LEASE_KEY=${STOCK_RECOVERY_LEASE_KEY:-stock:recovery:lease}
      - RECOVERY_LEASE_TTL_SECONDS=${STOCK_RECOVERY_LEASE_TTL_SECONDS:-10}
      - SAGA_MQ_STREAM_PARTITIONS=${SAGA_MQ_STREAM_PARTITIONS:-4}
      - SAGA_MQ_CONSUMER_GROUP=${STOCK_SAGA_MQ_CONSUMER_GROUP:-saga-stock-workers}
      - SAGA_MQ_BLOCK_MS=${SAGA_MQ_BLOCK_MS:-1000}
      - SAGA_MQ_BATCH_SIZE=${SAGA_MQ_BATCH_SIZE:-16}
      - SAGA_MQ_COMMAND_STREAM_MAXLEN=${SAGA_MQ_COMMAND_STREAM_MAXLEN:-100000}
      - SAGA_MQ_RESULT_STREAM_MAXLEN=${SAGA_MQ_RESULT_STREAM_MAXLEN:-100000}
    depends_on:
      cluster-init:
        condition: service_completed_successfully
    restart: always
    command: >
      sh -c "gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000
      -w $${STOCK_GUNICORN_WORKERS} --timeout 30 --log-level=info app:app"

  payment-service:
    build: ./payment
    image: user:latest
    environment:
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL:-http://order-service:5000}
      - PAYMENT_GUNICORN_WORKERS=${PAYMENT_GUNICORN_WORKERS:-1}
      - REDIS_HOST=main-cluster-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_CLUSTER_NODES=main-cluster-1:6379,main-cluster-2:6379,main-cluster-3:6379,main-cluster-4:6379,main-cluster-5:6379,main-cluster-6:6379
      - SAGA_MQ_REDIS_HOST=saga-cluster-1
      - SAGA_MQ_REDIS_PORT=6379
      - SAGA_MQ_REDIS_PASSWORD=redis
      - SAGA_MQ_REDIS_DB=0
      - SAGA_MQ_CLUSTER_NODES=saga-cluster-1:6379,saga-cluster-2:6379,saga-cluster-3:6379,saga-cluster-4:6379,saga-cluster-5:6379,saga-cluster-6:6379
      - SAGA_MQ_ENABLED=${SAGA_MQ_ENABLED:-true}
      - ENABLE_SAGA_WORKER=${PAYMENT_ENABLE_SAGA_WORKER:-true}
      - ENABLE_RECOVERY_LOOP=${PAYMENT_ENABLE_RECOVERY_LOOP:-true}
      - RECOVERY_LEASE_KEY=${PAYMENT_RECOVERY_LEASE_KEY:-payment:recovery:lease}
      - RECOVERY_LEASE_TTL_SECONDS=${PAYMENT_RECOVERY_LEASE_TTL_SECONDS:-10}
      - SAGA_MQ_STREAM_PARTITIONS=${SAGA_MQ_STREAM_PARTITIONS:-4}
      - SAGA_MQ_CONSUMER_GROUP=${PAYMENT_SAGA_MQ_CONSUMER_GROUP:-saga-payment-workers}
      - SAGA_MQ_BLOCK_MS=${SAGA_MQ_BLOCK_MS:-1000}
      - SAGA_MQ_BATCH_SIZE=${SAGA_MQ_BATCH_SIZE:-16}
      - SAGA_MQ_COMMAND_STREAM_MAXLEN=${SAGA_MQ_COMMAND_STREAM_MAXLEN:-100000}
      - SAGA_MQ_RESULT_STREAM_MAXLEN=${SAGA_MQ_RESULT_STREAM_MAXLEN:-100000}
    depends_on:
      cluster-init:
        condition: service_completed_successfully
    restart: always
    command: >
      sh -c "gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000
      -w $${PAYMENT_GUNICORN_WORKERS} --timeout 30 --log-level=info app:app"


  # --- Main Redis Cluster (order, stock, payment data) ---

  main-cluster-1:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname main-cluster-1
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  main-cluster-2:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname main-cluster-2
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  main-cluster-3:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname main-cluster-3
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  main-cluster-4:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname main-cluster-4
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  main-cluster-5:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname main-cluster-5
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  main-cluster-6:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname main-cluster-6
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always


  # --- Saga MQ Redis Cluster ---

  saga-cluster-1:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname saga-cluster-1
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  saga-cluster-2:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname saga-cluster-2
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  saga-cluster-3:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname saga-cluster-3
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  saga-cluster-4:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname saga-cluster-4
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  saga-cluster-5:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname saga-cluster-5
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always

  saga-cluster-6:
    image: redis:7.2-bookworm
    command: >
      redis-server
      --cluster-enabled yes --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000 --cluster-announce-hostname saga-cluster-6
      --cluster-preferred-endpoint-type hostname
      --appendonly yes --requirepass redis --masterauth redis
    restart: always


  # --- Cluster initializer (runs once, creates both clusters) ---

  cluster-init:
    image: redis:7.2-bookworm
    volumes:
      - ./cluster-init.sh:/cluster-init.sh:ro
    depends_on:
      - main-cluster-1
      - main-cluster-2
      - main-cluster-3
      - main-cluster-4
      - main-cluster-5
      - main-cluster-6
      - saga-cluster-1
      - saga-cluster-2
      - saga-cluster-3
      - saga-cluster-4
      - saga-cluster-5
      - saga-cluster-6
    restart: "no"
    command: sh /cluster-init.sh
