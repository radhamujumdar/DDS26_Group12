[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shop-common"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "redis==5.0.3",
  "msgspec==0.19.0",
  "httpx==0.27.2",
  "pydantic>=2,<3",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
