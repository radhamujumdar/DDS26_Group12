services:
  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${DDS_GATEWAY_PORT:-8000}:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - FLUXI_SERVER_URL=http://fluxi-server:8001
      - FLUXI_REDIS_MODE=direct
      - FLUXI_REDIS_URL=redis://:redis@fluxi-benchmark-redis:6379/0
      - FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS=${FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_READ_TIMEOUT_SECONDS=${FLUXI_HTTP_READ_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_WRITE_TIMEOUT_SECONDS=${FLUXI_HTTP_WRITE_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_POOL_TIMEOUT_SECONDS=${FLUXI_HTTP_POOL_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_MAX_CONNECTIONS=${FLUXI_HTTP_MAX_CONNECTIONS:-32}
      - FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS:-16}
      - FLUXI_HTTP_CONTROL_MAX_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_HTTP_RESULT_MAX_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_RESULT_WAIT_TIMEOUT_MS=${FLUXI_RESULT_WAIT_TIMEOUT_MS:-30000}
    command: gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000 -w ${ORDER_API_WORKERS:-4} --timeout 30 --log-level=info order.app.main:app
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db
      - fluxi-server

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    command: gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000 -w ${STOCK_API_WORKERS:-1} --timeout 30 --log-level=info stock.app.main:app
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: user:latest
    command: gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000 -w ${PAYMENT_API_WORKERS:-1} --timeout 30 --log-level=info payment.app.main:app
    env_file:
      - env/payment_redis.env
    depends_on:
      - payment-db

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  fluxi-benchmark-redis:
    image: redis:7.2-bookworm
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - ""
      - --protected-mode
      - "no"
      - --requirepass
      - redis
      - --maxmemory
      - 512mb

  fluxi-server:
    build:
      context: .
      dockerfile: fluxi-server/Dockerfile
    image: fluxi-server:latest
    environment:
      - FLUXI_REDIS_MODE=direct
      - FLUXI_REDIS_URL=redis://:redis@fluxi-benchmark-redis:6379/0
      - FLUXI_RESULT_WAIT_TIMEOUT_MS=${FLUXI_RESULT_WAIT_TIMEOUT_MS:-30000}
    command: uvicorn app:app --host 0.0.0.0 --port 8001 --workers ${FLUXI_SERVER_WORKERS:-3}
    depends_on:
      - fluxi-benchmark-redis
    ports:
      - "${DDS_FLUXI_SERVER_PORT:-8001}:8001"

  fluxi-scheduler:
    build:
      context: .
      dockerfile: fluxi-scheduler/Dockerfile
    image: fluxi-scheduler:latest
    environment:
      - FLUXI_REDIS_MODE=direct
      - FLUXI_REDIS_URL=redis://:redis@fluxi-benchmark-redis:6379/0
    depends_on:
      - fluxi-benchmark-redis

  order-checkout-worker:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    command: python -m order.workers.checkout_worker
    environment:
      - FLUXI_SERVER_URL=http://fluxi-server:8001
      - FLUXI_REDIS_MODE=direct
      - FLUXI_REDIS_URL=redis://:redis@fluxi-benchmark-redis:6379/0
      - FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS=${FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_READ_TIMEOUT_SECONDS=${FLUXI_HTTP_READ_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_WRITE_TIMEOUT_SECONDS=${FLUXI_HTTP_WRITE_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_POOL_TIMEOUT_SECONDS=${FLUXI_HTTP_POOL_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_MAX_CONNECTIONS=${FLUXI_HTTP_MAX_CONNECTIONS:-32}
      - FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS:-16}
      - FLUXI_HTTP_CONTROL_MAX_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_HTTP_RESULT_MAX_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_MAX_CONCURRENT_WORKFLOW_TASKS=${FLUXI_ORDER_WORKFLOW_CONCURRENCY:-2}
      - FLUXI_MAX_CONCURRENT_ACTIVITY_TASKS=${FLUXI_ORDER_ACTIVITY_CONCURRENCY:-1}
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db
      - fluxi-server

  stock-activity-worker:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    command: python -m stock.workers.stock_worker
    environment:
      - FLUXI_SERVER_URL=http://fluxi-server:8001
      - FLUXI_REDIS_MODE=direct
      - FLUXI_REDIS_URL=redis://:redis@fluxi-benchmark-redis:6379/0
      - FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS=${FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_READ_TIMEOUT_SECONDS=${FLUXI_HTTP_READ_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_WRITE_TIMEOUT_SECONDS=${FLUXI_HTTP_WRITE_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_POOL_TIMEOUT_SECONDS=${FLUXI_HTTP_POOL_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_MAX_CONNECTIONS=${FLUXI_HTTP_MAX_CONNECTIONS:-32}
      - FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS:-16}
      - FLUXI_HTTP_CONTROL_MAX_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_HTTP_RESULT_MAX_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_MAX_CONCURRENT_ACTIVITY_TASKS=${FLUXI_STOCK_ACTIVITY_CONCURRENCY:-4}
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db
      - fluxi-server

  payment-activity-worker:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: user:latest
    command: python -m payment.workers.payment_worker
    environment:
      - FLUXI_SERVER_URL=http://fluxi-server:8001
      - FLUXI_REDIS_MODE=direct
      - FLUXI_REDIS_URL=redis://:redis@fluxi-benchmark-redis:6379/0
      - FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS=${FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_READ_TIMEOUT_SECONDS=${FLUXI_HTTP_READ_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_WRITE_TIMEOUT_SECONDS=${FLUXI_HTTP_WRITE_TIMEOUT_SECONDS:-15.0}
      - FLUXI_HTTP_POOL_TIMEOUT_SECONDS=${FLUXI_HTTP_POOL_TIMEOUT_SECONDS:-5.0}
      - FLUXI_HTTP_MAX_CONNECTIONS=${FLUXI_HTTP_MAX_CONNECTIONS:-32}
      - FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS:-16}
      - FLUXI_HTTP_CONTROL_MAX_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_HTTP_RESULT_MAX_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_CONNECTIONS:-192}
      - FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS=${FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS:-96}
      - FLUXI_MAX_CONCURRENT_ACTIVITY_TASKS=${FLUXI_PAYMENT_ACTIVITY_CONCURRENCY:-4}
    env_file:
      - env/payment_redis.env
    depends_on:
      - payment-db
      - fluxi-server
