services:
  gateway:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    cpus: 1.75
    volumes:
      - ./gateway_nginx.large.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${DDS_GATEWAY_PORT:-8000}:80"
    depends_on:
      order-service:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    restart: unless-stopped
    cpus: 2.5
    environment:
      GATEWAY_URL: http://gateway:80
      FLUXI_SERVER_URL: http://fluxi-server:8001
      FLUXI_REDIS_MODE: sentinel
      FLUXI_REDIS_URL: redis://:redis@fluxi-redis-master:6379/0
      FLUXI_SENTINEL_ENDPOINTS: fluxi-sentinel-1:26379,fluxi-sentinel-2:26379,fluxi-sentinel-3:26379
      FLUXI_SENTINEL_SERVICE_NAME: fluxi-master
      FLUXI_SENTINEL_MIN_OTHER_SENTINELS: "1"
      FLUXI_HTTP_CONNECT_TIMEOUT_SECONDS: "2.0"
      FLUXI_HTTP_READ_TIMEOUT_SECONDS: "70.0"
      FLUXI_HTTP_WRITE_TIMEOUT_SECONDS: "30.0"
      FLUXI_HTTP_POOL_TIMEOUT_SECONDS: "5.0"
      FLUXI_HTTP_MAX_CONNECTIONS: "192"
      FLUXI_HTTP_MAX_KEEPALIVE_CONNECTIONS: "96"
      FLUXI_HTTP_CONTROL_MAX_CONNECTIONS: "96"
      FLUXI_HTTP_CONTROL_MAX_KEEPALIVE_CONNECTIONS: "48"
      FLUXI_HTTP_RESULT_MAX_CONNECTIONS: "192"
      FLUXI_HTTP_RESULT_MAX_KEEPALIVE_CONNECTIONS: "96"
      FLUXI_RESULT_WAIT_TIMEOUT_MS: "60000"
      REDIS_MODE: sentinel
      REDIS_HOST: order-db-master
      REDIS_PORT: "6379"
      REDIS_SENTINEL_ENDPOINTS: order-sentinel-1:26379,order-sentinel-2:26379,order-sentinel-3:26379
      REDIS_SENTINEL_SERVICE_NAME: order-master
      REDIS_SENTINEL_MIN_OTHER_SENTINELS: "1"
      REDIS_FAILOVER_RETRY_TIMEOUT_SECONDS: "30.0"
      DDS_TRACE_LOGGING: "0"
      DDS_LOG_LEVEL: WARNING
    command: gunicorn -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5000 -w 3 --timeout 60 --log-level=info order.app.main:app
    env_file:
      - env/order_redis.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/readyz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    depends_on:
      - order-db-master
      - order-db-replica
      - order-sentinel-1
      - order-sentinel-2
      - order-sentinel-3
      - fluxi-server

  order-db-master:
    image: redis:7.2-bookworm
    restart: unless-stopped
    cpus: 1.5
    command:
      - redis-server
      - --requirepass
      - redis
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - ""
      - --protected-mode
      - "no"
      - --maxmemory
      - 6gb
      - --maxmemory-policy
      - noeviction
    volumes:
      - order-db-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  order-db-replica:
    image: redis:7.2-bookworm
    restart: unless-stopped
    cpus: 1.5
    command:
      - redis-server
      - --replicaof
      - order-db-master
      - "6379"
      - --masterauth
      - redis
      - --requirepass
      - redis
      - --replica-announce-ip
      - order-db-replica
      - --replica-announce-port
      - "6379"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - ""
      - --protected-mode
      - "no"
      - --maxmemory
      - 6gb
      - --maxmemory-policy
      - noeviction
    depends_on:
      - order-db-master
    volumes:
      - order-db-replica-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  order-sentinel-1:
    image: redis:7.2-bookworm
    restart: unless-stopped
    cpus: 0.25
    command:
      - sh
      - -c
      - |
        cat <<'EOF' >/tmp/sentinel.conf
        port 26379
        dir /tmp
        protected-mode no
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor order-master order-db-master 6379 2
        sentinel auth-pass order-master redis
        sentinel down-after-milliseconds order-master 3000
        sentinel failover-timeout order-master 10000
        sentinel parallel-syncs order-master 1
        EOF
        redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      - order-db-master
      - order-db-replica

  order-sentinel-2:
    image: redis:7.2-bookworm
    restart: unless-stopped
    cpus: 0.25
